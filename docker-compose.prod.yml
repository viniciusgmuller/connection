services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      NEXT_PUBLIC_SERVER_URL: ${NEXT_PUBLIC_SERVER_URL:-https://connection.duckstudio.design}
      NODE_ENV: production
    networks:
      - coolify
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:3000/"]
      interval: 30s
      timeout: 10s
      start_period: 60s
      retries: 3

networks:
  coolify:
    external: true
